<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer ></script>
</head>
<body>
    <!-- Calculator input box -->
    <div id="display"></div>
    <!-- Calculator input buttons -->
    <div id="buttons">
        <button type="button">
            <h1>7</h1>
        </button>
        <button type="button">
            <h1>8</h1>
        </button>
        <button type="button">
            <h1>9</h1>
        </button>
        <button type="button">
            <h1>/</h1>
        </button>
        <button type="button">
            <h1>4</h1>
        </button>
        <button type="button">
            <h1>5</h1>
        </button>
        <button type="button">
            <h1>6</h1>
        </button>
        <button type="button">
            <h1>*</h1>
        </button>
        <button type="button">
            <h1>1</h1>
        </button>
        <button type="button">
            <h1>2</h1>
        </button><button type="button">
            <h1>3</h1>
        </button>
        <button type="button">
            <h1>-</h1>
        </button>
        <button type="button">
            <h1>C</h1>
        </button>
        <button type="button">
            <h1>0</h1>
        </button>
        <button type="button">
            <h1>.</h1>
        </button>
        <button type="button">
            <h1>+</h1>
        </button>
        <button type="button">
            <h1>=</h1>
        </button>
    </div>
    <!-- History box -->
    <div id="history">
        <ul id="history-log"></ul>
    </div>

    <div id="clear-history">
        <button type="button">
            <h2>Clear History</h2>
        </button>
    </div>
    
</body>
</html>

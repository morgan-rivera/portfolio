<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Howler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
  <script src="/static/js/header.js" type="module" defer></script>
  <script src="/static/js/feed.js" type="module" defer></script>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>
  <!-- Header -->
  <header class="px-4 py-2 shadow-sm">
    <div class="title">Howler</div>
    <div class="dropdown header-user-dropdown">
        <!-- Header username and avatar -->
        <div class="d-flex align-items-center" id="userDropdownTrigger" data-bs-toggle="dropdown">
            <span id="username" class="username text-white me-2">@Username</span>
            <img id="avatar" class="avatar" src="" alt="Avatar">
        </div>
        
        <!-- Header dropdown -->
        <ul class="dropdown-menu dropdown-menu-end shadow">
            <li><a class="dropdown-item" href="/feed">Home</a></li>
            <li><a class="dropdown-item" href="/profile">My Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><button class="dropdown-item text-danger" id="logout-btn">Logout</button></li>
        </ul>
    </div>
  </header>

  <main class="container mt-4">
  <div class="row">
    
    <div class="col-md-3">
      <!-- Navigation Bar -->
      <nav class="card shadow-sm p-3 mb-4">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link border-bottom py-2  text-dark" href="/feed">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link py-2  text-dark" href="/profile">My Profile</a>
          </li>
        </ul>
      </nav>

      <!-- Users -->
      <div class="card howlers-card">
        <div class="card-header">Howlers</div>
        <ul class="list-group list-group-flush scrollable-list" id="user-list"></ul>
      </div>
    </div>

    <div class="col-md-9">
      <!-- Post Howl -->
      <div class="card shadow-sm p-3 mb-4" id="howl-input">
        <textarea class="form-control mb-3" rows="3" placeholder="What's howling?"></textarea>
        <div class="d-flex justify-content-end">
           <button class="btn btn-danger px-4 fw-bold">Howl</button>
        </div>
      </div>

      <!-- Howl Feed -->
      <div class="list-group list-group-flush scrollable-list" id="howl-list"></div>
    </div>

  </div> 
</main>

</body>


</html>

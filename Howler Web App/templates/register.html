<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Howler</title>
  <script src="/static/js/register.js" type="module" defer></script>
  <link rel="stylesheet" href="/static/css/styles.css"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
  <link href="/static/css/styles.css" rel="stylesheet"/>
</head>

<body>
  <!-- Header -->
  <header class="py-3 h3 text-white">Howler</header>

  <main class="container mt-5" style="max-width: 450px;">
    <h1 class="text-center mb-4">Register</h1>

    <!-- Errors -->
    <div id="errorbox" class="alert alert-danger d-none" role="alert"></div>

    <!-- Registration Form -->
    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label">First Name</label>
        <input type="text" class="form-control" id="first_name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Last Name</label>
        <input type="text" class="form-control" id="last_name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="username" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>

      <div class="d-grid mt-4">
        <input type="submit" class="btn btn-primary" value="Register">
      </div>
    </form>

    <p class="text-center mt-3">
      Already have an account? <span><a href="/">Sign In</a></span>
    </p>
  </main>
</body>


</html>

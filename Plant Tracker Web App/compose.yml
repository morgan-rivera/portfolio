name: csc342project

services:
  proxy:
    image: nginx:latest
    restart: unless-stopped
    volumes:
      - ./proxy/default.conf.template:/etc/nginx/templates/default.conf.template
    ports:
      - "80:80"
  
  database:
    image: mariadb:latest
    restart: unless-stopped
    ports:
      - 3307:3306
    volumes:
      - "./database/data:/var/lib/mysql"
      - "./database/db_schema:/docker-entrypoint-initdb.d"
    env_file:
      - .env

  api:
    build: ./api
    restart: unless-stopped
    volumes:
      - ./api/src:/app/src
      - ./frontend/src/static/images/plants:/app/static/images/plants  # shared upload folder
    environment:
      - PORT=80
    env_file:
      - .env
    depends_on:
      - database

  frontend:
    build: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src
    environment:
      - PORT=80
      - API_SECRET_KEY=${API_SECRET_KEY}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evergreen Profile</title>
  <link rel="stylesheet" href="./static/css/styles.css">
  <link rel="stylesheet" href="../static/css/profile.css">
  <script type="module" src="../static/js/sw.js" defer></script>
  <script type="module" src="../static/js/notifications.js" defer></script>

  <!-- BEGIN FAVICON -->
  <link rel="icon" href="/static/images/favicon-96x96.png">
  <meta name="theme-color" content="#1e4b3f">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/images/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="256x256" href="/static/images/icon-384x384.png">
  <link rel="apple-touch-icon" sizes="256x256" href="/static/images/icon-512x512.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/static/images/icon-512x512.png">
  <!-- END FAVICON -->
  <!-- BEGIN INSTALLABLE APP-->
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-status-bar-style" content="black">
  <meta name="mobile-web-app-title" content="Evergreen">
  <!-- END INSTALLABLE APP-->

</head>
<body>

  <!-- Header -->
  <header class="top-bar">
    <h1>Profile</h1>
    <img src="../static/images/logo.svg" alt="Evergreen Logo" class="logo">
  </header>

  <!-- Profile Hero -->
  <section class="profile-hero">
    <div class="avatar-wrapper">
      <div class="avatar" id="avatarDiv">U</div>
      <div class="avatar-edit">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      </div>
    </div>
    <div class="profile-name" id="profileName">...</div>
    <div class="profile-bio" id="profileBio" style="color:#6b7f78;font-size:0.9rem;margin-top:4px;">No bio yet</div>
    <button class="edit-profile-btn">Edit Profile</button>
  </section>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-number" id="statPlants">0</div>
      <div class="stat-label">Plants</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="statTasks">0</div>
      <div class="stat-label">Tasks Done</div>
    </div>
  </div>

    <!-- Preferences -->
    <div class="section-card">
        <div class="section-title">Preferences</div>
        <div class="section-item" id="enableNotifications" style="cursor:pointer;">
            <div class="item-left">
                <img src="/static/images/icons/notification_icon.png" alt="notificationIcon" style="width: 24px; height: 24px;">
                <span class="item-label">Enable Notifications</span>
            </div>
            <span class="chevron">&#8250;</span>
        </div>
        <!-- <div class="section-item" id="subscribe" style="cursor:pointer;">
            <div class="item-left">
                <img src="/static/images/icons/subscribe_icon.png" alt="subcribeIcon" style="width: 24px; height: 24px;">
                <span class="item-label">Subscribe to Push Reminders</span>
            </div>
            <span class="chevron">&#8250;</span>
        </div> -->
    </div>


  </div>

  <!-- Account -->
  <div class="section-card">
    <div class="section-title">Account</div>
    <div class="section-item" id="changePasswordItem" style="cursor:pointer;">
      <div class="item-left">
        <img src="/static/images/icons/password_icon.png" alt="subcribeIcon" style="width: 24px; height: 24px;">
        <span class="item-label">Change Password</span>
      </div>
      <span class="chevron">&#8250;</span>
    </div>
  </div>

  <!-- Logout -->
  <button class="logout-btn" onclick="handleLogout()">Log Out</button>

  <!-- Bottom Navigation -->
    <nav class="bottom-bar">
        <a href="/dashboard" class="active">
            <img src="/static/images/icons/home_icon.png" alt="homeIcon" style="width: 24px; height: 24px;">
            <!-- <span class="nav-icon">&#127968;</span> -->
            <span>Home</span>
        </a>
        <a href="/plants">
            <img src="/static/images/icons/plant_icon.png" alt="plantIcon" style="width: 24px; height: 24px;">
            <!-- <span class="nav-icon">&#127807;</span> -->
            <span>Explore Plants</span>
        </a>
        <a href="/schedule">
            <img src="/static/images/icons/schedule_icon.png" alt="scheduleIcon" style="width: 24px; height: 24px;">
            <!-- <span class="nav-icon">&#128197;</span> -->
            <span>Schedule</span>
        </a>
        <a href="/profile">
            <!-- <span class="nav-icon">&#128100;</span> -->
            <img src="/static/images/icons/profile_icon.png" alt="scheduleIcon" style="width: 24px; height: 24px;">
            <span>Profile</span>
        </a>
    </nav>

  <script type="module" src="../static/js/profile.js"></script>

</body>
</html>
